<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Add Course')}"></head>
<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Add New Course</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/courses/create}" th:object="${course}" method="POST">
                            
                            <div class="mb-3">
                                <label for="code" class="form-label">Course Code</label>
                                <input type="text" id="code" th:field="*{code}" class="form-control" 
                                       th:classappend="${#fields.hasErrors('code')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('code')}" th:errors="*{code}">
                                    Code Error Message
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="name" class="form-label">Course Name</label>
                                <input type="text" id="name" th:field="*{name}" class="form-control" 
                                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                                    Name Error Message
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="credits" class="form-label">Credits</label>
                                <input type="number" id="credits" th:field="*{credits}" class="form-control" 
                                       th:classappend="${#fields.hasErrors('credits')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('credits')}" th:errors="*{credits}">
                                    Credits Error Message
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="department" class="form-label">Department</label>
                                <select id="department" th:field="*{department}" class="form-select"
                                        th:classappend="${#fields.hasErrors('department')} ? 'is-invalid' : ''">
                                    <option value="">Select Department...</option>
                                    <option value="Computer Science">Computer Science</option>
                                    <option value="Mathematics">Mathematics</option>
                                    <option value="Business">Business</option>
                                    <option value="Engineering">Engineering</option>
                                    <option value="Arts">Arts</option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('department')}" th:errors="*{department}">
                                    Department Error Message
                                </div>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/courses}" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">Save Course</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
